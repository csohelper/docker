services:
  csohelper-xray:
    build: ./xray
    restart: always
    cap_add:
      - NET_ADMIN
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
      - ./xray/setup_tproxy.sh:/setup_tproxy.sh:ro
    entrypoint: ["/bin/sh", "/setup_tproxy.sh"]
    # Теперь порты Bot API и Nginx нужно прокидывать ТУТ
    ports:
      - "8081:8081" # Bot API
      - "8082:8082" # Nginx
      - "5432:5432" # Postgres
      - "6379:6379" # Redis
  csohelper-postgres:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: ${TZ}
    volumes:
      - ./storage/pgdata/:/var/lib/postgresql/data/
    healthcheck:
      test: pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 5s
    network_mode: "service:csohelper-xray"

  csohelper-redis:
    image: redis:7
    restart: always
    environment:
      TZ: ${TZ}
    volumes:
      - ./storage/redis:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    network_mode: "service:csohelper-xray"

  csohelper-bot-api:
    image: aiogram/telegram-bot-api:latest
    restart: always
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_LOCAL: ${TELEGRAM_LOCAL}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    volumes:
      - ./storage/tgapi/:/var/lib/telegram-bot-api
    network_mode: "service:csohelper-xray"
#    healthcheck:
#      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1:8081/bot${TELEGRAM_BOT_TOKEN}/getMe || exit 1"]
#      interval: 10s
#      timeout: 5s
#      retries: 10
#      start_period: 10s

  csohelper-nginx:
    image: nginx:latest
    restart: always
    environment:
      TZ: ${TZ}
    volumes:
      - ./storage/tgapi/:/var/lib/telegram-bot-api:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    network_mode: "service:csohelper-xray"
    depends_on:
      csohelper-bot-api:
        condition: service_started
    #healthcheck:
    #  test: ["CMD-SHELL", "curl -f http://127.0.0.1:8082/health || exit 1"]
    #  interval: 10s
    #  timeout: 5s
    #  retries: 3
    #  start_period: 3s
#    ports:
#      - "8082:8082"

  csohelper-bot:
    build: bot
    restart: always
    environment:
      TZ: ${TZ}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    volumes:
      - ./storage/bot/:/app/storage/
    network_mode: "service:csohelper-xray"
  #  depends_on:
  #    csohelper-postgres:
  #      condition: service_healthy
  #    csohelper-redis:
  #      condition: service_healthy
  #    csohelper-nginx:
  #      condition: service_healthy
